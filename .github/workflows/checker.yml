name: Auto Key Checker

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  check-keys:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Download Xray (linux-64)
        run: |
          wget -O xray.zip https://github.com/XTLS/Xray-core/releases/download/v26.1.23/Xray-linux-64.zip
          unzip xray.zip -d xray-bin
          mv xray-bin/xray ./xray
          chmod +x ./xray

      - name: Run Checker Script
        run: python main.py
        timeout-minutes: 340
        env:
          PYTHONUNBUFFERED: 1

      - name: Commit & Push Results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update checked keys [${{ github.run_id }}]"
          file_pattern: "checked/*"
          commit_user_name: "GitHub Actions Bot"
          commit_user_email: "actions@github.com"
